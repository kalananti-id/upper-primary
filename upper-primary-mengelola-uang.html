<!doctype html>
<html lang="id">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>UP 5.10 – Mengelola Uang</title>
  <style>
    :root {
      --bg1: #F7FAFF;
      --bg2: #ECFEFF;
      --card: #FFFFFF;
      --ink: #0F172A;
      --muted: #475569;
      --line: rgba(226, 232, 240, .95);
      --brand: #4F46E5;
      --brand2: #06B6D4;
      --ok: #16A34A;
      --bad: #DC2626;
      --warn: #F59E0B;
      --radius: 22px;
      --shadow: 0 18px 40px rgba(15, 23, 42, .08);
      --shadow2: 0 10px 22px rgba(15, 23, 42, .06);
      --focus: 0 0 0 4px rgba(79, 70, 229, .18);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    }

    * { box-sizing: border-box }

    body {
      margin: 0;
      font-family: var(--sans);
      color: var(--ink);
      background:
        radial-gradient(1200px 520px at 10% 0%, rgba(6, 182, 212, .18), transparent 60%),
        radial-gradient(1200px 520px at 90% 0%, rgba(79, 70, 229, .16), transparent 55%),
        linear-gradient(180deg, var(--bg1), #F3F6FF 45%, var(--bg2));
      min-height: 100vh;
    }

    .app {
      width: min(1100px, 96vw);
      margin: 18px auto 26px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, .72);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow2);
    }

    .brand { display: flex; align-items: center; gap: 10px; }

    .logo {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(79, 70, 229, .18), rgba(6, 182, 212, .20));
      border: 1px solid rgba(226, 232, 240, .9);
      display: grid;
      place-items: center;
      font-weight: 1000;
      color: rgba(79, 70, 229, 1);
    }

    .brand h1 {
      margin: 0;
      font-size: 14px;
      line-height: 1.15;
      letter-spacing: .2px;
    }

    .brand .sub {
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      margin-top: 2px;
    }

    .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .btn {
      border: 1px solid rgba(226, 232, 240, .95);
      background: rgba(255, 255, 255, .9);
      padding: 10px 12px;
      border-radius: 16px;
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(15, 23, 42, .06);
      transition: transform .06s ease, box-shadow .12s ease, background .12s ease;
      user-select: none;
    }

    .btn:hover { transform: translateY(-1px) }
    .btn:active { transform: translateY(0px) }

    .btn.primary {
      background: linear-gradient(135deg, rgba(79, 70, 229, .12), rgba(6, 182, 212, .14));
      border-color: rgba(79, 70, 229, .18);
    }

    .btn.ghost { background: transparent; box-shadow: none }
    .btn:focus { outline: none; box-shadow: var(--focus); }

    .progressWrap {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 260px;
      justify-content: flex-end;
    }

    .progress {
      width: 180px;
      height: 10px;
      background: rgba(226, 232, 240, .9);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(226, 232, 240, .95);
    }

    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, rgba(79, 70, 229, .85), rgba(6, 182, 212, .85));
      border-radius: 999px;
      transition: width .25s ease;
    }

    .count {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      font-weight: 900;
    }

    .stage {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .60);
      box-shadow: var(--shadow);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: calc(100vh - 145px);
    }

    .slide {
      flex: 1;
      background: rgba(255, 255, 255, .68);
      border: 1px solid rgba(229, 234, 245, .95);
      border-radius: var(--radius);
      box-shadow: var(--shadow2);
      padding: 20px;
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .slideInner {
      max-width: 980px;
      margin: 0 auto;
      max-height: calc(100vh - 190px);
      overflow-y: auto;
      padding-right: 8px;
    }

    .slideInner::-webkit-scrollbar { width: 10px; }
    .slideInner::-webkit-scrollbar-thumb {
      background: rgba(96, 112, 153, .25);
      border-radius: 999px;
      border: 3px solid rgba(255, 255, 255, .9);
    }

    h2 { margin: 6px 0 10px; font-size: 30px; letter-spacing: -.3px }
    h3 { margin: 0 0 8px; font-size: 18px }
    p { margin: 0 0 10px; color: var(--muted); font-weight: 800; line-height: 1.55 }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 1000;
      font-size: 12px;
      letter-spacing: .2px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(79, 70, 229, .16);
      background: rgba(79, 70, 229, .06);
      color: rgba(55, 65, 81, .95);
    }

    .grid { display: grid; gap: 14px }
    .cols2 { grid-template-columns: 1fr 1fr }

    @media (max-width: 860px) {
      .cols2 { grid-template-columns: 1fr }
      .progressWrap { min-width: unset }
      .progress { width: 130px }
      h2 { font-size: 26px }
    }

    .card {
      background: rgba(255, 255, 255, .92);
      border: 1px solid rgba(226, 232, 240, .95);
      border-radius: 22px;
      padding: 14px;
      box-shadow: 0 10px 18px rgba(15, 23, 42, .06);
    }

    .hint {
      background: rgba(6, 182, 212, .10);
      border: 1px dashed rgba(6, 182, 212, .35);
      border-radius: 18px;
      padding: 12px 14px;
      color: rgba(30, 41, 59, .92);
      font-weight: 900;
      line-height: 1.5;
    }

    .money {
      font-family: var(--mono);
      font-weight: 1000;
      font-size: 14px;
      padding: 8px 10px;
      border-radius: 14px;
      border: 1px solid rgba(226, 232, 240, .95);
      background: rgba(255, 255, 255, .95);
      display: inline-flex;
      gap: 10px;
      align-items: center;
    }

    ul.list {
      margin: 8px 0 0 18px;
      color: var(--muted);
      font-weight: 850;
      line-height: 1.55;
    }

    .choices {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .choice {
      border: 1px solid rgba(226, 232, 240, .95);
      border-radius: 18px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, .96);
      font-weight: 950;
      color: rgba(30, 41, 59, .96);
      cursor: pointer;
      user-select: none;
      transition: transform .06s ease, border-color .12s ease, background .12s ease;
    }

    .choice:hover { transform: translateY(-1px) }
    .choice.active { border-color: rgba(79, 70, 229, .35); background: rgba(79, 70, 229, .06) }
    .choice.ok { border-color: rgba(22, 163, 74, .35); background: rgba(22, 163, 74, .08) }
    .choice.bad { border-color: rgba(220, 38, 38, .35); background: rgba(220, 38, 38, .08) }

    .feedback {
      display: none;
      margin-top: 10px;
      border-radius: 18px;
      padding: 12px 14px;
      border: 1px solid rgba(226, 232, 240, .95);
      background: rgba(255, 255, 255, .92);
      color: var(--muted);
      font-weight: 900;
      line-height: 1.5;
    }

    .feedback.show { display: block }
    .fbOk {
      border-color: rgba(22, 163, 74, .35);
      background: rgba(22, 163, 74, .08);
      color: rgba(15, 23, 42, .92);
    }
    .fbBad {
      border-color: rgba(220, 38, 38, .35);
      background: rgba(220, 38, 38, .08);
      color: rgba(15, 23, 42, .92);
    }

    .step {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 12px;
      border-radius: 18px;
      border: 1px solid rgba(226, 232, 240, .95);
      background: rgba(255, 255, 255, .96);
    }

    .dot {
      width: 26px;
      height: 26px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: rgba(79, 70, 229, .10);
      border: 1px solid rgba(79, 70, 229, .18);
      font-weight: 1000;
      color: rgba(79, 70, 229, .95);
      flex: 0 0 auto;
    }

    .sim {
      border: 1px solid rgba(226, 232, 240, .95);
      border-radius: 22px;
      padding: 14px;
      background: rgba(255, 255, 255, .92);
      box-shadow: 0 10px 18px rgba(15, 23, 42, .06);
    }

    .simBtns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .simBtn {
      border: 1px solid rgba(226, 232, 240, .95);
      background: rgba(255, 255, 255, .96);
      border-radius: 18px;
      padding: 12px 14px;
      font-weight: 1000;
      cursor: pointer;
      user-select: none;
      transition: transform .06s ease, background .12s ease, border-color .12s ease;
      min-width: 180px;
    }

    .simBtn:hover { transform: translateY(-1px) }
    .simBtn.income { border-color: rgba(22, 163, 74, .28); background: rgba(22, 163, 74, .06) }
    .simBtn.expense { border-color: rgba(245, 158, 11, .28); background: rgba(245, 158, 11, .08) }

    .log {
      margin-top: 10px;
      font-family: var(--mono);
      font-size: 12px;
      color: rgba(71, 85, 105, .95);
      background: rgba(255, 255, 255, .75);
      border: 1px solid rgba(226, 232, 240, .95);
      border-radius: 18px;
      padding: 10px 12px;
      max-height: 150px;
      overflow: auto;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <div id="accessGate" style="
    position:fixed; inset:0;
    background:linear-gradient(135deg,#eef2ff,#ecfeff);
    display:flex; align-items:center; justify-content:center;
    z-index:9999;">
    <div class="card" style="max-width:420px;width:92%;text-align:center">
      <h2>🔐 Kode Akses</h2>
      <p>Masukkan kode untuk memulai sesi.</p>

      <input id="accessInput" placeholder="MASUKKAN KODE" autocomplete="off"
        style="width:100%;padding:12px 14px;border-radius:16px;border:1px solid rgba(226,232,240,.95);
        font-weight:900;letter-spacing:2px;text-align:center" />

      <button class="btn primary" id="accessBtn" style="margin-top:12px">Masuk</button>
      <div class="feedback" id="accessFb" style="margin-top:10px"></div>

      <div class="hint" style="margin-top:10px">Kode diberikan oleh guru.</div>
    </div>
  </div>

  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="logo">UP</div>
        <div>
          <h1>Upper Primary</h1>
          <div class="sub">5.10 Mengelola Uang</div>
        </div>
      </div>

      <div class="controls">
        <button class="btn ghost" id="btnHome">🏠 Awal</button>
        <button class="btn" id="btnPrev">←</button>
        <button class="btn primary" id="btnNext">→</button>
      </div>

      <div class="progressWrap">
        <div class="progress"><div class="bar" id="bar"></div></div>
        <div class="count" id="count">1/1</div>
      </div>
    </div>

    <div class="stage">
      <div class="slide">
        <div class="slideInner" id="content"></div>
      </div>
    </div>
  </div>

  <script>
    const slides = [
      {
        title: "Judul",
        html: `
          <div class="kicker">✨ Mulai</div>
          <h2>Mengelola Uang</h2>
          <p>Hari ini kita belajar bahwa uang bisa bertambah dan berkurang. Kita juga belajar bagaimana mencatat pemasukan dan pengeluaran.</p>

          <div class="grid cols2" style="margin-top:12px">
            <div class="card">
              <h3>Target kita</h3>
              <ul class="list">
                <li>Membedakan pemasukan dan pengeluaran</li>
                <li>Melihat bahwa uang selalu berubah</li>
                <li>Membuat pencatatan transaksi sederhana</li>
                <li>Membuat simulasi pencatatan di Scratch</li>
              </ul>
            </div>

            <div class="card">
              <h3>Siap mulai?</h3>
              <div class="choices" data-quiz="ready">
                <div class="choice" data-answer="right">✅ Siap!</div>
                <div class="choice" data-answer="right">✅ Yuk belajar!</div>
              </div>
              <div class="feedback" data-quiz-feedback="ready"></div>
              <button class="btn primary" data-goto="1" style="margin-top:10px">🚀 Mulai</button>
            </div>
          </div>
        `
      },

      {
        title: "Konsep Awal",
        html: `
          <div class="kicker">💡 Konsep</div>
          <h2>Uang Bisa Bertambah dan Berkurang</h2>
          <p>Dalam kehidupan sehari-hari, uang tidak selalu tetap. Kadang bertambah, kadang berkurang, tergantung apa yang kita lakukan.</p>

          <div class="grid cols2" style="margin-top:12px">
            <div class="card">
              <h3>Contoh uang bertambah</h3>
              <ul class="list">
                <li>Dapat uang saku</li>
                <li>Dapat hadiah</li>
                <li>Dapat uang dari membantu orang tua</li>
              </ul>
            </div>

            <div class="card">
              <h3>Contoh uang berkurang</h3>
              <ul class="list">
                <li>Beli snack</li>
                <li>Beli mainan</li>
                <li>Beli alat sekolah</li>
              </ul>
            </div>
          </div>
        `
      },

      {
        title: "Pemasukan dan Pengeluaran",
        html: `
          <div class="kicker">📊 Konsep</div>
          <h2>Pemasukan dan Pengeluaran</h2>
          <p>Pemasukan adalah uang yang masuk. Pengeluaran adalah uang yang keluar.</p>

          <div class="card" style="margin-top:12px">
            <div class="step"><div class="dot">+</div><div><b>Pemasukan</b> → uang bertambah</div></div>
            <div class="step" style="margin-top:8px"><div class="dot">-</div><div><b>Pengeluaran</b> → uang berkurang</div></div>
            <div class="hint" style="margin-top:12px">
              Kalau kita paham bedanya, kita jadi lebih mudah mengelola uang.
            </div>
          </div>
        `
      },

      {
        title: "Quiz Cepat",
        html: `
          <div class="kicker">❓ Cek Paham</div>
          <h2>Ini Pemasukan atau Pengeluaran?</h2>

          <div class="card" style="margin-top:12px">
            <p><b>Dapat uang saku</b> adalah…</p>
            <div class="choices" data-quiz="q1">
              <div class="choice" data-answer="right">Pemasukan</div>
              <div class="choice" data-answer="wrong">Pengeluaran</div>
            </div>
            <div class="feedback" data-quiz-feedback="q1"></div>
          </div>

          <div class="card" style="margin-top:12px">
            <p><b>Beli snack</b> adalah…</p>
            <div class="choices" data-quiz="q2">
              <div class="choice" data-answer="wrong">Pemasukan</div>
              <div class="choice" data-answer="right">Pengeluaran</div>
            </div>
            <div class="feedback" data-quiz-feedback="q2"></div>
          </div>
        `
      },

      {
        title: "Kenapa Harus Dicatat",
        html: `
          <div class="kicker">📝 Penting</div>
          <h2>Kenapa Uang Harus Dicatat?</h2>
          <p>Kalau kita tidak mencatat, kita tidak tahu uang kita dipakai untuk apa.</p>

          <div class="grid cols2" style="margin-top:12px">
            <div class="card">
              <h3>Kalau tidak dicatat…</h3>
              <ul class="list">
                <li>Tidak tahu uang habis ke mana</li>
                <li>Tidak sadar kalau sering boros</li>
                <li>Sulit mengatur uang</li>
              </ul>
            </div>

            <div class="card">
              <h3>Kalau dicatat…</h3>
              <ul class="list">
                <li>Tahu uang masuk dari mana</li>
                <li>Tahu uang keluar untuk apa</li>
                <li>Bisa lebih hati-hati</li>
              </ul>
            </div>
          </div>
        `
      },

      {
        title: "Catatan Sederhana",
        html: `
          <div class="kicker">📒 Contoh</div>
          <h2>Pencatatan Sederhana</h2>
          <p>Kita bisa membuat catatan seperti ini:</p>

          <div class="card" style="margin-top:12px">
            <div class="step"><div class="dot">1</div><div>Dapat uang saku → <b>+10.000</b></div></div>
            <div class="step" style="margin-top:8px"><div class="dot">2</div><div>Beli snack → <b>-5.000</b></div></div>
            <div class="step" style="margin-top:8px"><div class="dot">3</div><div>Sisa uang jadi berubah</div></div>
            <div class="hint" style="margin-top:12px">Catatan kecil seperti ini membantu kita melihat pola penggunaan uang.</div>
          </div>
        `
      },

      {
        title: "Hubungkan dengan Scratch",
        html: `
          <div class="kicker">🧱 Scratch</div>
          <h2>Mengelola Uang di Scratch</h2>
          <p>Di Scratch, kita bisa membuat simulasi sederhana. Setiap klik bisa membuat uang bertambah atau berkurang, lalu muncul catatan transaksinya.</p>

          <div class="grid cols2" style="margin-top:12px">
            <div class="card">
              <h3>Variabel yang dipakai</h3>
              <ul class="list">
                <li><b>Uang</b></li>
              </ul>
            </div>

            <div class="card">
              <h3>Yang terjadi di program</h3>
              <ul class="list">
                <li>Klik pemasukan → uang bertambah</li>
                <li>Klik pengeluaran → uang berkurang</li>
                <li>Program menampilkan catatan</li>
              </ul>
            </div>
          </div>
        `
      },

      {
        title: "Nilai Awal",
        html: `
          <div class="kicker">🟢 Start</div>
          <h2>Mengatur Nilai Awal</h2>
          <p>Saat program dimulai, kita perlu menentukan nilai awal uang.</p>

          <div class="card" style="margin-top:12px">
            <div class="step"><div class="dot">1</div><div><b>when green flag clicked</b></div></div>
            <div class="step" style="margin-top:8px"><div class="dot">2</div><div><b>set</b> Uang to <b>0</b></div></div>
            <div class="hint" style="margin-top:12px">
              Artinya, program mulai dari uang 0 lalu akan berubah sesuai transaksi.
            </div>
          </div>
        `
      },

      {
        title: "Transaksi Masuk",
        html: `
          <div class="kicker">➕ Pemasukan</div>
          <h2>Contoh Pemasukan</h2>
          <p>Kalau kita mendapat uang saku, maka Uang bertambah.</p>

          <div class="card" style="margin-top:12px">
            <div class="step"><div class="dot">1</div><div><b>when this sprite clicked</b></div></div>
            <div class="step" style="margin-top:8px"><div class="dot">2</div><div><b>change</b> Uang by <b>10000</b></div></div>
            <div class="step" style="margin-top:8px"><div class="dot">3</div><div><b>say</b> “Dapat uang saku +10000”</div></div>
          </div>
        `
      },

      {
        title: "Transaksi Keluar",
        html: `
          <div class="kicker">➖ Pengeluaran</div>
          <h2>Contoh Pengeluaran</h2>
          <p>Kalau kita membeli snack, maka Uang berkurang.</p>

          <div class="card" style="margin-top:12px">
            <div class="step"><div class="dot">1</div><div><b>when this sprite clicked</b></div></div>
            <div class="step" style="margin-top:8px"><div class="dot">2</div><div><b>change</b> Uang by <b>-5000</b></div></div>
            <div class="step" style="margin-top:8px"><div class="dot">3</div><div><b>say</b> “Beli snack -5000”</div></div>
          </div>
        `
      },

      {
        title: "Simulator",
        html: `
          <div class="kicker">🧪 Coba Interaktif</div>
          <h2>Money Tracker Simulator</h2>
          <p>Klik transaksi di bawah ini. Lihat bagaimana uang berubah dan catatan bertambah.</p>

          <div class="sim" data-money-sim>
            <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between">
              <div class="money">UANG: <span id="simMoney">Rp0</span></div>
              <button class="btn" id="simReset">Reset</button>
            </div>

            <div class="simBtns">
              <div class="simBtn income" data-label="Dapat uang saku" data-change="10000">
                💵 Dapat uang saku<br><small>+10.000</small>
              </div>
              <div class="simBtn income" data-label="Dapat hadiah" data-change="5000">
                🎁 Dapat hadiah<br><small>+5.000</small>
              </div>
              <div class="simBtn expense" data-label="Beli snack" data-change="-5000">
                🍪 Beli snack<br><small>-5.000</small>
              </div>
              <div class="simBtn expense" data-label="Beli mainan kecil" data-change="-15000">
                🧸 Beli mainan kecil<br><small>-15.000</small>
              </div>
            </div>

            <div class="feedback show" id="simFb" style="display:block; margin-top:12px">
              Klik transaksi untuk mulai mencatat.
            </div>

            <div class="log" id="simLog">Riwayat transaksi akan muncul di sini.</div>
          </div>
        `
      },

      {
        title: "Amati Pola",
        html: `
          <div class="kicker">🔍 Analisis</div>
          <h2>Apa yang Terjadi pada Uangmu?</h2>
          <p>Kalau sering memilih pengeluaran, uang akan cepat berkurang. Kalau ada pemasukan, uang bertambah lagi.</p>

          <div class="card" style="margin-top:12px">
            <div class="hint">
              Mengelola uang bukan hanya soal punya uang, tapi juga soal <b>mencatat</b> dan <b>memperhatikan perubahan</b>.
            </div>
          </div>
        `
      },

      {
        title: "Latihan",
        html: `
          <div class="kicker">🏁 Latihan</div>
          <h2>Buat Catatan Uangmu di Scratch</h2>
          <p>Sekarang waktunya membuat versi sederhana sendiri.</p>

          <div class="card" style="margin-top:12px">
            <h3>Checklist</h3>
            <ul class="list">
              <li>Buat variabel <b>Uang</b></li>
              <li>Set nilai awal saat green flag</li>
              <li>Buat 1 sprite pemasukan</li>
              <li>Buat 1 sprite pengeluaran</li>
              <li>Tampilkan perubahan uang lewat pesan</li>
            </ul>
          </div>
        `
      },

      {
        title: "Refleksi",
        html: `
          <div class="kicker">🪞 Refleksi</div>
          <h2>Apa yang kamu pelajari?</h2>

          <div class="grid cols2" style="margin-top:12px">
            <div class="card">
              <h3>Konsep uang</h3>
              <div class="choices" data-quiz="ref1">
                <div class="choice" data-answer="right">Pemasukan membuat uang bertambah</div>
                <div class="choice" data-answer="right">Pengeluaran membuat uang berkurang</div>
                <div class="choice" data-answer="wrong">Uang selalu tetap</div>
              </div>
              <div class="feedback" data-quiz-feedback="ref1"></div>
            </div>

            <div class="card">
              <h3>Konsep mencatat</h3>
              <div class="choices" data-quiz="ref2">
                <div class="choice" data-answer="right">Mencatat membantu kita tahu uang dipakai untuk apa</div>
                <div class="choice" data-answer="wrong">Mencatat tidak penting</div>
              </div>
              <div class="feedback" data-quiz-feedback="ref2"></div>
            </div>
          </div>
        `
      },

      {
        title: "Penutup",
        html: `
          <div class="kicker">✅ Selesai</div>
          <h2>Kerja bagus! 🎉</h2>
          <p>Kamu sudah belajar bahwa uang bisa bertambah dan berkurang, dan mencatat membantu kita lebih bijak dalam mengelola uang.</p>

          <div class="grid cols2" style="margin-top:12px">
            <div class="card">
              <h3>Ringkasan</h3>
              <ul class="list">
                <li>Pemasukan = uang masuk</li>
                <li>Pengeluaran = uang keluar</li>
                <li>Catatan membantu kita memahami pola uang</li>
              </ul>
            </div>

            <div class="card">
              <h3>Bridge</h3>
              <div class="hint">
                Setelah tahu cara mengelola uang, kita akan lebih siap membuat sistem dan game di bab berikutnya.
              </div>
            </div>
          </div>
        `
      }
    ];

    let idx = 0;
    const content = document.getElementById("content");
    const bar = document.getElementById("bar");
    const count = document.getElementById("count");
    const btnPrev = document.getElementById("btnPrev");
    const btnNext = document.getElementById("btnNext");
    const btnHome = document.getElementById("btnHome");

    function clamp(n, a, b) { return Math.max(a, Math.min(b, n)); }

    function showFeedback(el, html, type) {
      if (!el) return;
      el.classList.add("show");
      el.style.display = "block";
      el.classList.remove("fbOk", "fbBad");
      if (type === "ok") el.classList.add("fbOk");
      if (type === "bad") el.classList.add("fbBad");
      el.innerHTML = html;
    }

    function wireQuiz(group) {
      const id = group.getAttribute("data-quiz");
      const fb = content.querySelector('[data-quiz-feedback="' + id + '"]');
      const items = [...group.querySelectorAll(".choice")];

      items.forEach(ch => {
        ch.addEventListener("click", () => {
          items.forEach(x => x.classList.remove("active", "ok", "bad"));
          ch.classList.add("active");
          const isRight = ch.getAttribute("data-answer") === "right";
          if (isRight) {
            ch.classList.add("ok");
            showFeedback(fb, "✅ Mantap!", "ok");
          } else {
            ch.classList.add("bad");
            showFeedback(fb, "⚠️ Coba pikir lagi ya.", "bad");
          }
        });
      });
    }

    let simState = null;

    function formatRp(n) {
      const sign = n < 0 ? "-" : "";
      const s = Math.abs(Math.round(n)).toString();
      return sign + "Rp" + s.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    function wireMoneySim() {
      const wrap = content.querySelector("[data-money-sim]");
      if (!wrap) { simState = null; return; }

      simState = { money: 0, log: [] };

      const moneyEl = content.querySelector("#simMoney");
      const fb = content.querySelector("#simFb");
      const logEl = content.querySelector("#simLog");
      const resetBtn = content.querySelector("#simReset");

      function renderSim(msg, type) {
        moneyEl.textContent = formatRp(simState.money).replace("-", "");
        if (msg) {
          fb.className = "feedback show";
          fb.style.display = "block";
          if (type === "ok") fb.classList.add("fbOk");
          if (type === "bad") fb.classList.add("fbBad");
          fb.innerHTML = msg;
        }
        logEl.textContent = simState.log.length ? simState.log.join("\n") : "Riwayat transaksi akan muncul di sini.";
      }

      function addLog(line) {
        simState.log.unshift(line);
        simState.log = simState.log.slice(0, 8);
      }

      wrap.querySelectorAll("[data-change]").forEach(btn => {
        btn.addEventListener("click", () => {
          const label = btn.getAttribute("data-label");
          const change = Number(btn.getAttribute("data-change") || "0");
          simState.money += change;

          const signText = change > 0 ? "+" : "";
          addLog(`${label} → ${signText}${formatRp(change)} | Total: ${formatRp(simState.money).replace("-", "")}`);

          if (change > 0) {
            renderSim(`✅ <b>${label}</b><br>Uang bertambah menjadi <b>${formatRp(simState.money).replace("-", "")}</b>`, "ok");
          } else {
            renderSim(`💡 <b>${label}</b><br>Uang berkurang menjadi <b>${formatRp(simState.money).replace("-", "")}</b>`, "ok");
          }
        });
      });

      resetBtn.addEventListener("click", () => {
        simState.money = 0;
        simState.log = [];
        renderSim("Klik transaksi untuk mulai mencatat.", null);
      });

      renderSim("Klik transaksi untuk mulai mencatat.", null);
    }

    function wireInteractions() {
      content.querySelectorAll("[data-quiz]").forEach(wireQuiz);

      content.querySelectorAll("[data-goto]").forEach(b => {
        b.addEventListener("click", () => {
          const to = Number(b.getAttribute("data-goto"));
          idx = clamp(to, 0, slides.length - 1);
          render();
          content.scrollTop = 0;
        });
      });

      wireMoneySim();
    }

    function render() {
      const s = slides[idx];
      content.innerHTML = s.html;
      const pct = ((idx + 1) / slides.length) * 100;
      bar.style.width = pct + "%";
      count.textContent = (idx + 1) + "/" + slides.length;
      wireInteractions();
      content.scrollTop = 0;
    }

    function go(d) {
      idx = clamp(idx + d, 0, slides.length - 1);
      render();
    }

    btnPrev.addEventListener("click", () => go(-1));
    btnNext.addEventListener("click", () => go(1));
    btnHome.addEventListener("click", () => { idx = 0; render(); });

    window.addEventListener("keydown", (e) => {
      if (document.getElementById("accessGate").style.display !== "none") return;
      if (e.key === "ArrowLeft") go(-1);
      if (e.key === "ArrowRight") go(1);
      if (e.key === "Home") { idx = 0; render(); }
    });

    const ACCESS_CODE = "RGMDSUP25";
    const gate = document.getElementById("accessGate");
    const input = document.getElementById("accessInput");
    const btn = document.getElementById("accessBtn");
    const fb = document.getElementById("accessFb");

    input.addEventListener("input", () => { input.value = input.value.toUpperCase(); });
    btn.addEventListener("click", checkAccess);
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") checkAccess(); });

    function checkAccess() {
      if (input.value.trim() === ACCESS_CODE) {
        gate.style.display = "none";
      } else {
        fb.className = "feedback show fbBad";
        fb.style.display = "block";
        fb.textContent = "Kode salah. Coba lagi.";
      }
    }

    render();
  </script>
</body>
</html>
