<!doctype html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>UOB MDS – Lower Primary – Coding Festival Stage 1</title>
    <style>
        :root {
            --bg1: #F7FAFF;
            --bg2: #F3F6FF;
            --card: #FFFFFF;
            --ink: #0F172A;
            --muted: #475569;
            --line: rgba(226, 232, 240, .95);
            --brand: #4F46E5;
            --brand2: #06B6D4;
            --ok: #16A34A;
            --bad: #DC2626;
            --warn: #F59E0B;
            --radius: 22px;
            --shadow: 0 18px 40px rgba(15, 23, 42, .08);
            --shadow2: 0 10px 22px rgba(15, 23, 42, .06);
            --focus: 0 0 0 4px rgba(79, 70, 229, .18);
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: var(--sans);
            color: var(--ink);
            background:
                radial-gradient(1200px 520px at 10% 0%, rgba(6, 182, 212, .18), transparent 60%),
                radial-gradient(1200px 520px at 90% 0%, rgba(79, 70, 229, .16), transparent 55%),
                linear-gradient(180deg, var(--bg1), var(--bg2) 45%, var(--bg1));
            min-height: 100vh;
        }

        .app {
            width: min(1100px, 96vw);
            margin: 18px auto 26px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: rgba(255, 255, 255, .72);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow2);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 38px;
            height: 38px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(79, 70, 229, .18), rgba(6, 182, 212, .20));
            border: 1px solid rgba(226, 232, 240, .9);
            display: grid;
            place-items: center;
            font-weight: 1000;
            color: rgba(79, 70, 229, 1);
        }

        .brand h1 {
            margin: 0;
            font-size: 14px;
            line-height: 1.15;
            letter-spacing: .2px;
        }

        .brand .sub {
            font-size: 12px;
            color: var(--muted);
            font-weight: 800;
            margin-top: 2px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            border: 1px solid rgba(226, 232, 240, .95);
            background: rgba(255, 255, 255, .9);
            padding: 10px 12px;
            border-radius: 16px;
            font-weight: 1000;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(15, 23, 42, .06);
            transition: transform .06s ease, box-shadow .12s ease, background .12s ease;
            user-select: none;
        }

        .btn:hover {
            transform: translateY(-1px)
        }

        .btn:active {
            transform: translateY(0px)
        }

        .btn.primary {
            background: linear-gradient(135deg, rgba(79, 70, 229, .12), rgba(6, 182, 212, .14));
            border-color: rgba(79, 70, 229, .18);
        }

        .btn.ghost {
            background: transparent;
            box-shadow: none
        }

        .btn:focus {
            outline: none;
            box-shadow: var(--focus);
        }

        .progressWrap {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 260px;
            justify-content: flex-end;
        }

        .progress {
            width: 180px;
            height: 10px;
            background: rgba(226, 232, 240, .9);
            border-radius: 999px;
            overflow: hidden;
            border: 1px solid rgba(226, 232, 240, .95);
        }

        .bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, rgba(79, 70, 229, .85), rgba(6, 182, 212, .85));
            border-radius: 999px;
            transition: width .25s ease;
        }

        .count {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted);
            font-weight: 900;
        }

        .stage {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: rgba(255, 255, 255, .60);
            box-shadow: var(--shadow);
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: calc(100vh - 145px);
        }

        .slide {
            flex: 1;
            background: rgba(255, 255, 255, .68);
            border: 1px solid rgba(229, 234, 245, .95);
            border-radius: var(--radius);
            box-shadow: var(--shadow2);
            padding: 20px;
            overflow: hidden;
            backdrop-filter: blur(8px);
        }

        .slideInner {
            max-width: 980px;
            margin: 0 auto;
            max-height: calc(100vh - 190px);
            overflow-y: auto;
            padding-right: 8px;
        }

        .slideInner::-webkit-scrollbar {
            width: 10px;
        }

        .slideInner::-webkit-scrollbar-thumb {
            background: rgba(96, 112, 153, .25);
            border-radius: 999px;
            border: 3px solid rgba(255, 255, 255, .9);
        }

        .slideInner::-webkit-scrollbar-track {
            background: transparent;
        }

        h2 {
            margin: 6px 0 10px;
            font-size: 30px;
            letter-spacing: -.3px
        }

        h3 {
            margin: 0 0 8px;
            font-size: 18px
        }

        p {
            margin: 0 0 10px;
            color: var(--muted);
            font-weight: 800;
            line-height: 1.55
        }

        .kicker {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 1000;
            font-size: 12px;
            letter-spacing: .2px;
            padding: 7px 10px;
            border-radius: 999px;
            border: 1px solid rgba(79, 70, 229, .16);
            background: rgba(79, 70, 229, .06);
            color: rgba(55, 65, 81, .95);
        }

        .grid {
            display: grid;
            gap: 14px
        }

        .cols2 {
            grid-template-columns: 1fr 1fr
        }

        .cols3 {
            grid-template-columns: repeat(3, 1fr)
        }

        @media (max-width: 860px) {

            .cols2,
            .cols3 {
                grid-template-columns: 1fr
            }

            .progressWrap {
                min-width: unset
            }

            .progress {
                width: 130px
            }

            h2 {
                font-size: 26px
            }
        }

        .card {
            background: rgba(255, 255, 255, .92);
            border: 1px solid rgba(226, 232, 240, .95);
            border-radius: 22px;
            padding: 14px;
            box-shadow: 0 10px 18px rgba(15, 23, 42, .06);
        }

        .miniRow {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center
        }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 7px 10px;
            border-radius: 999px;
            border: 1px solid rgba(226, 232, 240, .95);
            background: rgba(255, 255, 255, .92);
            color: rgba(30, 41, 59, .92);
            font-weight: 1000;
            font-size: 12px;
        }

        ul.list {
            margin: 8px 0 0 18px;
            color: var(--muted);
            font-weight: 850;
            line-height: 1.55
        }

        .choices {
            display: grid;
            gap: 10px;
            margin-top: 10px
        }

        .choice {
            border: 1px solid rgba(226, 232, 240, .95);
            border-radius: 18px;
            padding: 12px 14px;
            background: rgba(255, 255, 255, .96);
            font-weight: 950;
            color: rgba(30, 41, 59, .96);
            cursor: pointer;
            user-select: none;
            transition: transform .06s ease, border-color .12s ease, background .12s ease;
        }

        .choice:hover {
            transform: translateY(-1px)
        }

        .choice.active {
            border-color: rgba(79, 70, 229, .35);
            background: rgba(79, 70, 229, .06)
        }

        .choice.ok {
            border-color: rgba(22, 163, 74, .35);
            background: rgba(22, 163, 74, .08)
        }

        .choice.bad {
            border-color: rgba(220, 38, 38, .35);
            background: rgba(220, 38, 38, .08)
        }

        .feedback {
            display: none;
            margin-top: 10px;
            border-radius: 18px;
            padding: 12px 14px;
            border: 1px solid rgba(226, 232, 240, .95);
            background: rgba(255, 255, 255, .92);
            color: var(--muted);
            font-weight: 900;
            line-height: 1.5;
        }

        .feedback.show {
            display: block
        }

        .fbOk {
            border-color: rgba(22, 163, 74, .35);
            background: rgba(22, 163, 74, .08);
            color: rgba(15, 23, 42, .92)
        }

        .fbBad {
            border-color: rgba(220, 38, 38, .35);
            background: rgba(220, 38, 38, .08);
            color: rgba(15, 23, 42, .92)
        }

        .input {
            width: 100%;
            border: 1px solid rgba(226, 232, 240, .95);
            background: rgba(255, 255, 255, .96);
            border-radius: 16px;
            padding: 12px 14px;
            font-weight: 950;
            color: rgba(30, 41, 59, .96);
        }

        .emojiBig {
            font-size: 58px;
            line-height: 1;
        }

        .timelineCard {
            position: relative;
            padding-left: 18px;
        }

        .timelineCard::before {
            content: "";
            position: absolute;
            left: 0;
            top: 6px;
            bottom: 6px;
            width: 4px;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(79, 70, 229, .75), rgba(6, 182, 212, .7));
        }

        .pitchStep {
            border: 1px dashed rgba(79, 70, 229, .28);
            background: linear-gradient(180deg, rgba(79, 70, 229, .04), rgba(6, 182, 212, .04));
        }

        .checkPill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, .9);
            border: 1px solid rgba(226, 232, 240, .95);
            font-weight: 950;
            color: rgba(30, 41, 59, .95);
        }

        .twoBig {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        @media (max-width: 860px) {
            .twoBig {
                grid-template-columns: 1fr;
            }
        }

        .bigNum {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            font-weight: 1000;
            background: linear-gradient(135deg, rgba(79, 70, 229, .16), rgba(6, 182, 212, .16));
            border: 1px solid rgba(79, 70, 229, .18);
            color: rgba(79, 70, 229, 1);
            flex: 0 0 auto;
        }
    </style>
</head>

<body>
    <div id="accessGate"
        style="position:fixed; inset:0; background:linear-gradient(135deg,#eef2ff,#ecfeff); display:flex; align-items:center; justify-content:center; z-index:9999;">
        <div class="card" style="max-width:420px;width:92%;text-align:center">
            <h2>🔐 Kode Akses</h2>
            <p>Masukkan kode untuk memulai sesi.</p>
            <input id="accessInput" class="input" placeholder="MASUKKAN KODE" autocomplete="off"
                style="text-align:center;font-weight:900;letter-spacing:2px" />
            <button class="btn primary" id="accessBtn" style="margin-top:12px">Masuk</button>
            <div class="feedback" id="accessFb" style="margin-top:10px"></div>
            <div class="card" style="margin-top:10px;background:rgba(79,70,229,.05)">
                <p style="margin:0">Kode diberikan oleh guru.</p>
            </div>
        </div>
    </div>

    <div class="app">
        <div class="topbar">
            <div class="brand">
                <div class="logo">LP</div>
                <div>
                    <h1>Lower Primary</h1>
                    <div class="sub">Coding Festival – Stage 1</div>
                </div>
            </div>

            <div class="controls">
                <button class="btn ghost" id="btnHome" title="Kembali ke awal">🏠 Awal</button>
                <button class="btn" id="btnPrev" title="Sebelumnya (←)">←</button>
                <button class="btn primary" id="btnNext" title="Berikutnya (→)">→</button>
            </div>

            <div class="progressWrap">
                <div class="progress" aria-label="Progress">
                    <div class="bar" id="bar"></div>
                </div>
                <div class="count" id="count">1/1</div>
            </div>
        </div>

        <div class="stage">
            <div class="slide" role="region" aria-label="Slide">
                <div class="slideInner" id="content"></div>
            </div>
        </div>
    </div>

    <script>
        const slides = [

{
title: "Pembuka",
html: `
<h2>🚀 Coding Festival Dimulai!</h2>
<p>Kali ini kamu akan membuat proyek coding yang punya tujuan.</p>

<div class="card" style="margin-top:12px;text-align:center">
<div class="emojiBig">🎮💡</div>
<p style="margin-top:10"><b>Kamu bukan cuma bikin game, tapi menyampaikan pesan!</b></p>
</div>
`
},

{
title: "Apa itu Coding Festival",
html: `
<h2>Apa Itu Coding Festival?</h2>
<p>Coding Festival adalah kegiatan membuat proyek coding sendiri.</p>

<div class="card">
<ul class="list">
<li>Kamu punya ide</li>
<li>Kamu membuat proyek</li>
<li>Kamu menjelaskan hasilnya</li>
</ul>
</div>
`
},

{
title: "Stage 1",
html: `
<h2>🎯 Stage 1: Buat Proyek</h2>

<div class="checklist" data-checklist="stage1">
<div class="checkItem"><div class="checkBox">✓</div><div>Menentukan ide</div></div>
<div class="checkItem"><div class="checkBox">✓</div><div>Membuat alur cerita / game</div></div>
<div class="checkItem"><div class="checkBox">✓</div><div>Membuat interaksi</div></div>
<div class="checkItem"><div class="checkBox">✓</div><div>Menjelaskan proyek</div></div>
</div>

<div class="meterWrap">
<div class="meter"><div class="meterBar" id="stage1Meter"></div></div>
<div class="meterText" id="stage1MeterText">0 dari 4</div>
</div>
`
},

{
title: "Tema",
html: `
<h2>💰 Tema: Financial Literacy</h2>
<p>Proyekmu harus berhubungan dengan uang.</p>

<div class="ideaTags" data-select-group="tema">
<div class="ideaTag">Menabung</div>
<div class="ideaTag">Uang jajan</div>
<div class="ideaTag">Kebutuhan vs keinginan</div>
<div class="ideaTag">Mengatur uang</div>
</div>

<div class="resultBox" id="temaResult">Pilih tema yang kamu suka.</div>
`
},

{
title: "Bentuk Proyek",
html: `
<h2>🎮 Bentuk Proyek</h2>
<p>Untuk upper primary, proyek bisa berupa:</p>

<div class="grid cols2">
<div class="card">
<p><b>Game sederhana</b></p>
<p>Pemain memilih sesuatu dan mendapatkan hasil</p>
</div>

<div class="card">
<p><b>Cerita interaktif</b></p>
<p>Karakter mengambil keputusan</p>
</div>
</div>
`
},

{
title: "Interaksi",
html: `
<h2>🧠 Apa Itu Interaksi?</h2>

<div class="choices" data-quiz="interaksi">
<div class="choice" data-answer="wrong">Karakter bergerak sendiri</div>
<div class="choice" data-answer="right">Pemain menekan tombol dan terjadi sesuatu</div>
<div class="choice" data-answer="wrong">Hanya animasi berjalan</div>
</div>

<div class="feedback" data-quiz-feedback="interaksi"></div>
`
},

{
title: "Logic Sederhana",
html: `
<h2>🔀 Logic: Pilihan dan Hasil</h2>
<p>Game yang baik punya pilihan.</p>

<div class="choices" data-quiz="logic">
<div class="choice" data-answer="wrong">Semua pilihan hasilnya sama</div>
<div class="choice" data-answer="right">Pilihan berbeda → hasil berbeda</div>
<div class="choice" data-answer="wrong">Tidak ada pilihan</div>
</div>

<div class="feedback" data-quiz-feedback="logic"></div>
`
},

{
title: "Contoh Ide",
html: `
<h2>💡 Contoh Ide Proyek</h2>

<div class="card">
<p><b>Game: Pilih Jajan atau Menabung</b></p>
<ul class="list">
<li>Pilih jajan → uang habis</li>
<li>Pilih menabung → uang bertambah</li>
</ul>
</div>
`
},

{
title: "Ciri Proyek Bagus",
html: `
<h2>✅ Pilih Ciri Proyek Bagus</h2>

<div class="choices" data-multi="good">
<div class="choice" data-correct="true">Ada tujuan</div>
<div class="choice" data-correct="true">Ada pilihan</div>
<div class="choice" data-correct="true">Ada hasil berbeda</div>
<div class="choice" data-correct="false">Hanya animasi saja</div>
</div>

<button class="btn primary" id="checkGood">Cek</button>
<div class="feedback" id="goodFb"></div>
`
},

{
title: "Pitching",
html: `
<h2>🗣️ Ceritakan Proyekmu</h2>

<div class="card">
<ul class="list">
<li>Judul proyek</li>
<li>Cerita / masalah</li>
<li>Cara kerja game</li>
<li>Pesan yang ingin disampaikan</li>
</ul>
</div>
`
},

{
title: "Latihan Pitch",
html: `
<h2>🎤 Coba Tulis Ide Kamu</h2>

<input class="input" placeholder="Judul proyek" />
<textarea class="input" placeholder="Cerita / masalah"></textarea>
<textarea class="input" placeholder="Cara kerja game"></textarea>
<textarea class="input" placeholder="Pesan tentang uang"></textarea>
`
},

{
title: "Submission",
html: `
<h2>📦 Yang Harus Dikumpulkan</h2>

<div class="checklist" data-checklist="submit">
<div class="checkItem"><div class="checkBox">✓</div><div>File proyek</div></div>
<div class="checkItem"><div class="checkBox">✓</div><div>Video</div></div>
<div class="checkItem"><div class="checkBox">✓</div><div>Deskripsi</div></div>
<div class="checkItem"><div class="checkBox">✓</div><div>Screenshot</div></div>
<div class="checkItem"><div class="checkBox">✓</div><div>Pitch deck</div></div>
</div>

<div class="meterWrap">
<div class="meter"><div class="meterBar" id="submitMeter"></div></div>
<div class="meterText" id="submitMeterText">0 dari 5</div>
</div>
`
},

{
title: "Checklist Akhir",
html: `
<h2>🧪 Cek Proyekmu</h2>

<div class="choices" data-quiz="check">
<div class="choice" data-answer="wrong">Yang penting lucu</div>
<div class="choice" data-answer="right">Bisa dimainkan dan ada pilihan</div>
<div class="choice" data-answer="wrong">Tidak perlu pesan</div>
</div>

<div class="feedback" data-quiz-feedback="check"></div>
`
},

{
title: "Brainstorm",
html: `
<h2>💡 Ide Proyekku</h2>

<textarea class="input" placeholder="Masalah"></textarea>
<textarea class="input" placeholder="Pilihan dalam game"></textarea>
<textarea class="input" placeholder="Pesan"></textarea>
`
},

{
title: "Penutup",
html: `
<h2>🔥 Kamu Siap!</h2>

<div class="card">
<ul class="list">
<li>Kamu punya ide</li>
<li>Kamu tahu cara bikin interaksi</li>
<li>Kamu siap mulai proyek</li>
</ul>
</div>

<button class="btn primary" data-goto="0">Restart</button>
`
}

];

        let idx = 0;
        const content = document.getElementById("content");
        const bar = document.getElementById("bar");
        const count = document.getElementById("count");
        const btnPrev = document.getElementById("btnPrev");
        const btnNext = document.getElementById("btnNext");
        const btnHome = document.getElementById("btnHome");

        function clamp(n, a, b) { return Math.max(a, Math.min(b, n)); }

        const ACCESS_CODE = "RGMDSUP25";
        const gate = document.getElementById("accessGate");
        const input = document.getElementById("accessInput");
        const btn = document.getElementById("accessBtn");
        const fb = document.getElementById("accessFb");

        input.addEventListener("input", () => { input.value = input.value.toUpperCase(); });
        btn.addEventListener("click", checkAccess);
        input.addEventListener("keydown", (e) => { if (e.key === "Enter") checkAccess(); });

        function checkAccess() {
            if (input.value.trim() === ACCESS_CODE) {
                gate.style.display = "none";
            } else {
                fb.className = "feedback show fbBad";
                fb.textContent = "Kode salah. Coba lagi.";
            }
        }

        function getQuizMsg(id, ok) {
            const msgs = {
                problem: {
                    ok: "✅ Betul! Problem yang baik harus nyata dan masih berhubungan dengan pengelolaan uang.",
                    bad: "⚠️ Coba lagi. Untuk SMP, problem sebaiknya masih terkait tabungan, pengeluaran, atau kebiasaan finansial."
                },
                logic: {
                    ok: "✅ Betul! Aplikasi biasanya menerima input, memproses data, lalu menampilkan hasil.",
                    bad: "⚠️ Belum tepat. Coba pilih jawaban yang menunjukkan ada proses atau logic di dalam aplikasi."
                },
                check: {
                    ok: "✅ Benar! Sebelum submit, proyek harus bisa dibuka, berjalan, dan mudah dipahami.",
                    bad: "⚠️ Belum tepat. Submission yang baik bukan hanya desain, tapi juga fungsi dan akses link."
                }
            };
            const m = msgs[id];
            if (!m) return ok ? "✅ Benar!" : "⚠️ Coba lagi.";
            return ok ? m.ok : m.bad;
        }

        function showFeedback(el, html, type) {
            if (!el) return;
            el.classList.add("show");
            el.style.display = "block";
            el.classList.remove("fbOk", "fbBad");
            if (type === "ok") el.classList.add("fbOk");
            if (type === "bad") el.classList.add("fbBad");
            el.innerHTML = html;
        }

        function wireQuiz(group) {
            const id = group.getAttribute("data-quiz");
            const fb = content.querySelector(`[data-quiz-feedback="${id}"]`);
            const items = [...group.querySelectorAll(".choice")];
            items.forEach(ch => {
                ch.addEventListener("click", () => {
                    items.forEach(x => x.classList.remove("active", "ok", "bad"));
                    ch.classList.add("active");
                    const isRight = ch.getAttribute("data-answer") === "right";
                    ch.classList.add(isRight ? "ok" : "bad");
                    showFeedback(fb, getQuizMsg(id, isRight), isRight ? "ok" : "bad");
                });
            });
        }

        function render() {
            const s = slides[idx];
            content.innerHTML = s.html;
            const pct = ((idx + 1) / slides.length) * 100;
            bar.style.width = pct + "%";
            count.textContent = `${idx + 1}/${slides.length}`;

            content.querySelectorAll('[data-quiz]').forEach(wireQuiz);

            content.querySelectorAll('[data-goto]').forEach(b => {
                b.addEventListener('click', () => {
                    const to = Number(b.getAttribute('data-goto'));
                    idx = clamp(to, 0, slides.length - 1);
                    render();
                    content.scrollTop = 0;
                });
            });
        }

        function go(d) {
            idx = clamp(idx + d, 0, slides.length - 1);
            render();
            content.scrollTop = 0;
        }

        btnPrev.addEventListener("click", () => go(-1));
        btnNext.addEventListener("click", () => go(1));
        btnHome.addEventListener("click", () => {
            idx = 0;
            render();
            content.scrollTop = 0;
        });

        window.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft") go(-1);
            if (e.key === "ArrowRight") go(1);
            if (e.key === "Home") {
                idx = 0;
                render();
                content.scrollTop = 0;
            }
        });

        render();
    </script>
</body>

</html>
